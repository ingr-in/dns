<!DOCTYPE html>
<html lang="sa">
<head>
    <meta charset="UTF-8">
    <title>नाम सर्वर विवरणम्</title>

    <!-- React CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <style>
        body {
            font-family: 'Nirmala UI', 'Mangal', 'Devanagari', Arial, sans-serif;
            background: #f0f4f8;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,20,30,0.15);
        }
        h1 {
            text-align: center;
            color: #b74b3f;
            font-size: 2rem;
            margin-bottom: 10px;
            border-bottom: 2px solid #e2d5c0;
            padding-bottom: 12px;
        }
        .subhead {
            text-align: center;
            color: #3a5e6b;
            font-size: 1.1rem;
            margin-bottom: 25px;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            background: #f9f3e7;
            margin: 12px 0;
            padding: 0;
            border-radius: 40px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.05);
            transition: transform 0.15s ease;
            border: 1px solid #dccbb8;
        }
        li:hover {
            transform: scale(1.01);
            background: #fff6e8;
            box-shadow: 0 6px 14px rgba(180,100,60,0.15);
        }
        li a {
            display: block;
            padding: 16px 24px;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: 500;
            color: #1e4a5f;
            text-align: center;
            letter-spacing: 0.3px;
            border-radius: 40px;
        }
        li a:hover {
            color: #b74b3f;
            text-decoration: underline;
        }
        .footer {
            text-align: center;
            margin-top: 35px;
            font-size: 0.95rem;
            color: #5c6f7e;
            background: #eef2f5;
            padding: 14px;
            border-radius: 30px;
        }
        .footer span {
            color: #a03d2f;
            font-weight: 500;
        }
        .note {
            background: #e7ded1;
            padding: 10px;
            border-radius: 30px;
            text-align: center;
            margin-bottom: 20px;
            color: #2b4b55;
        }
    </style>
</head>
<body>

<div id="root"></div>

<script>
    const nameServers = [
        "ku.ku.ingr.in",
        "su.su.ingr.in",
        "love.kuku.ingr.in",
        "love.suru.ingr.in",
        "crush.kuku.ingr.in",
        "crush.suru.ingr.in"
    ];

    // संस्कृत-सन्देशः — प्रत्येकं नामसर्वरं hyperlink रूपेण
    function NameServerApp() {
        return React.createElement(
            "div",
            { className: "container" },
            
            // शीर्षकम्
            React.createElement("h1", { style: { fontFamily: "'Nirmala UI', Mangal" } }, "🌐 नाम सर्वर विवरणम्"),
            
            // उपशीर्षकम्
            React.createElement(
                "p",
                { className: "subhead" },
                "अधोलिखितानि अस्य डोमेनस्य नाम-सर्वराणि सन्ति — कृपया क्लिक् कृत्वा अधिकजानकारीं प्राप्नुत"
            ),

            // सूची — प्रत्येकं नामसर्वरं योजयित्वा
            React.createElement(
                "ul",
                null,
                nameServers.map((ns, index) =>
                    React.createElement(
                        "li",
                        { key: index },
                        React.createElement(
                            "a",
                            { 
                                href: `http:/तिथी.html`,        // http:// प्रयुक्तम्
                                target: "_blank",            // नूतनपत्रे
                                rel: "noopener noreferrer"   // सुरक्षार्थम्
                            },
                            ns
                        )
                    )
                )
            ),

            // तथ्यांशः — DNS विषये
            React.createElement(
                "div",
                { className: "note" },
                "🔗 उपर्युक्तानि सर्वराणि क्लिक्-योग्यानि — एतानि DNS अभिलेखानां परीक्षणाय उपयुज्यन्ते"
            ),

            // पादटिप्पणी
            React.createElement(
                "div",
                { className: "footer" },
                React.createElement("span", null, "🕉️ "),
                "एतत् पृष्ठं DNS तथा होस्टिङ्-सूचनार्थं प्रयोज्यते — संस्कृत-सन्देशाः",
                React.createElement("span", null, " 🌸")
            )
        );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(NameServerApp));
</script>

<!-- वैकल्पिकः सरल-व्याख्याः -->
</body>
</html>
