<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>वैदिक पंचांग 🌸</title>

<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#667eea,#764ba2);
  padding:20px;
  color:#333;
}
.container{max-width:900px;margin:auto;}
.card{
  background:white;
  padding:20px;
  border-radius:10px;
  margin-top:20px;
  display:none;
}
.loading{text-align:center;display:none;}
.error{color:red;text-align:center;display:none;}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
}
.item{
  background:#f3f3f3;
  padding:10px;
  border-radius:8px;
  text-align:center;
}
button{
  padding:10px 20px;
  margin-top:10px;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="container">

<h2>🕉️ वैदिक पंचांग</h2>

<label>Latitude:</label>
<input type="number" id="lat" value="23.0225" step="0.0001">

<label>Longitude:</label>
<input type="number" id="lon" value="72.5714" step="0.0001">

<br>
<button onclick="fetchPanchang()">पंचांग देखें</button>

<div class="loading" id="loading">लोड हो रहा है...</div>
<div class="error" id="error">डेटा लोड नहीं हुआ</div>

<div class="card" id="card">

<h3>📅 पंचांग</h3>
<div class="grid">
<div class="item"><b>तिथि</b><div id="tithi"></div></div>
<div class="item"><b>पक्ष</b><div id="paksha"></div></div>
<div class="item"><b>माह</b><div id="month"></div></div>
<div class="item"><b>नक्षत्र</b><div id="nakshatra"></div></div>
<div class="item"><b>योग</b><div id="yoga"></div></div>
<div class="item"><b>करण</b><div id="karana"></div></div>
</div>

<h3>☀️ सूर्य समय</h3>
<div class="grid">
<div class="item"><b>सूर्योदय</b><div id="sunrise"></div></div>
<div class="item"><b>सूर्यास्त</b><div id="sunset"></div></div>
</div>

<h3>🌙 चंद्र समय</h3>
<div class="grid">
<div class="item"><b>चंद्रोदय</b><div id="moonrise"></div></div>
<div class="item"><b>चंद्रास्त</b><div id="moonset"></div></div>
</div>

<h3>🪐 ग्रह स्थिति</h3>
<div class="grid" id="planets"></div>

</div>
</div>

<script>

function fetchPanchang(){

const lat = document.getElementById("lat").value;
const lon = document.getElementById("lon").value;

document.getElementById("loading").style.display="block";
document.getElementById("card").style.display="none";
document.getElementById("error").style.display="none";

fetch(`https://sipa.ingr.in/pages/sti.php?sr=json&ajax=1&req=ajax&sanvi=subhmstu&lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lon)}`)
.then(res=>{
  if(!res.ok) throw new Error("Network error");
  return res.json();
})
.then(data=>{

document.getElementById("loading").style.display="none";

if(data.status!=="success"){
  document.getElementById("error").style.display="block";
  return;
}

document.getElementById("tithi").textContent = data.panchang?.tithi || "-";
document.getElementById("paksha").textContent = data.panchang?.paksha || "-";
document.getElementById("month").textContent = data.panchang?.month || "-";
document.getElementById("nakshatra").textContent = data.panchang?.nakshatra || "-";
document.getElementById("yoga").textContent = data.panchang?.yoga || "-";
document.getElementById("karana").textContent = data.panchang?.karana || "-";

document.getElementById("sunrise").textContent = data.sun_times?.sunrise || "-";
document.getElementById("sunset").textContent = data.sun_times?.sunset || "-";
document.getElementById("moonrise").textContent = data.moon_times?.moonrise || "-";
document.getElementById("moonset").textContent = data.moon_times?.moonset || "-";

const planetsDiv = document.getElementById("planets");
planetsDiv.innerHTML="";

if(data.planet_positions){
  Object.entries(data.planet_positions).forEach(([planet,pos])=>{
    const div=document.createElement("div");
    div.className="item";
    div.innerHTML=`<b>${planet}</b><div>${pos}°</div>`;
    planetsDiv.appendChild(div);
  });
}

document.getElementById("card").style.display="block";

})
.catch(err=>{
console.error(err);
document.getElementById("loading").style.display="none";
document.getElementById("error").style.display="block";
});

}

window.onload = fetchPanchang;

</script>

</body>
</html>
